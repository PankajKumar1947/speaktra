version: '3.8'

services:
  mongo:
    image: mongo
    container_name: speaktra-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis
    container_name: speaktra-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongo-data:
